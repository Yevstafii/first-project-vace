name: Build VACE worker

on:
  push:
    branches: [main]
    paths:
      - vace-worker/**
      - .github/workflows/build-vace-worker.yml

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./vace-worker
          push: true
          tags: ghcr.io/yevstafii/first-project-vace-worker:latest
